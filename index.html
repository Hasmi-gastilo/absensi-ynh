<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Absensi Yayasan Nurul Huda</title>

  <style>
    body{font-family:Arial, sans-serif; padding:24px}
    .card{max-width:420px; margin:auto; border:1px solid #ddd; padding:16px; border-radius:12px}
    input{width:100%; padding:10px; margin:8px 0; border-radius:10px; border:1px solid #ccc}
    button{width:100%; padding:12px; border:0; border-radius:12px; cursor:pointer}
  </style>
</head>

<body>
  <div class="card">
    <h2>Login</h2>

    <input id="username" placeholder="Username (guru/admin)" />
    <input id="password" type="password" placeholder="Password (guru/admin)" />

    <div style="margin:12px 0; text-align:center; color:#666">atau</div>

    <input id="nisn" placeholder="NISN (siswa)" />

    <button onclick="handleLogin()">Masuk Sekarang</button>

    <p id="out" style="margin-top:12px; color:#333"></p>
  </div>

  <script>
    // GANTI DENGAN URL DEPLOY /exec KAMU
    const API_URL = "https://script.google.com/macros/s/AKfycbzrq-q5I-3ykVgs8w9gN5Ygbiwn-urcE4F2B3u7L2EMU_GIAhxBF7v-1RocgqwVNxj6/exec";

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
        window[cb] = (data) => {
          resolve(data);
          cleanup();
        };

        const script = document.createElement("script");
        script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
        script.onerror = () => { reject(new Error("JSONP load failed")); cleanup(); };

        function cleanup() {
          delete window[cb];
          script.remove();
        }
        document.body.appendChild(script);
      });
    }

    async function handleLogin() {
      const out = document.getElementById("out");
      out.textContent = "Memproses...";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const nisn = document.getElementById("nisn").value.trim();

      // kalau nisn diisi, kita anggap login siswa
      const params = new URLSearchParams({
        action: "login",
        username,
        password,
        nisn
      });

      try {
        const res = await jsonp(API_URL + "?" + params.toString());

        if (res.success) {
          out.textContent = "Login berhasil. Role: " + res.role + ", Nama: " + (res.nama || "-");
          // TODO: simpan token res.token ke localStorage kalau kamu mau
          // localStorage.setItem("token", res.token);
        } else {
          out.textContent = "Gagal: " + res.message;
        }
      } catch (e) {
        out.textContent = "Error: " + e.message;
      }
    }
  </script>
</body>
</html>
